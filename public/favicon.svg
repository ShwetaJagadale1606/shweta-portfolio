<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8ba3ff"/>
      <stop offset="1" stop-color="#ef8ab2"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2a9c6"/>
      <stop offset="1" stop-color="#ef8ab2"/>
    </linearGradient>
  </defs>

  <!-- midnight tile with gradient ring -->
  <rect width="64" height="64" rx="15" fill="#0b0c13"/>
  <rect x="1.25" y="1.25" width="61.5" height="61.5" rx="13.75" fill="none" stroke="url(#ring)" stroke-width="2.5" opacity="0.9"/>

  <!-- ✿ brand flower -->
  <g transform="translate(32 33)">
    <g fill="url(#petal)">
      <ellipse rx="6.8" ry="12.5" cy="-11.5"/>
      <ellipse rx="6.8" ry="12.5" cy="-11.5" transform="rotate(72)"/>
      <ellipse rx="6.8" ry="12.5" cy="-11.5" transform="rotate(144)"/>
      <ellipse rx="6.8" ry="12.5" cy="-11.5" transform="rotate(216)"/>
      <ellipse rx="6.8" ry="12.5" cy="-11.5" transform="rotate(288)"/>
    </g>
    <circle r="5.6" fill="#8ba3ff"/>
    <circle r="2.2" fill="#0b0c13" opacity="0.55"/>
  </g>
</svg>
